<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trợ Lý GVCN 2.0</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #27ae60;
            --bg-color: #e0f2f1; /* Nền xanh ngọc bích nhạt */
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 40px 20px; /* Thêm khoảng cách trên dưới */
            color: #333;
            display: flex; /* Dùng flexbox để căn giữa khung */
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 1000px; /* Giữ khung rộng tối đa 1000px như bản đầu */
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); /* Tăng bóng đổ cho khung nổi hơn */
        }
        .header-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--secondary-color);
            padding-bottom: 15px;
        }
        .header-logo h1 {
            color: var(--primary-color);
            margin: 0;
            font-size: 28px;
        }
        .app-logo {
            height: 60px;
            width: auto;
        }
        .batch-area {
            background: #e8f4f8; /* Màu nền cho khu vực nhập như bản đầu */
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
        }
        .batch-area label {
            font-weight: bold;
            color: var(--primary-color);
            display: block;
            margin-bottom: 10px;
        }
        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-family: inherit;
            box-sizing: border-box; /* Đảm bảo textarea không bị tràn viền */
        }
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }
        button {
            flex: 1;
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover {
            background-color: #219150;
        }
        .secondary-btn {
            background-color: var(--primary-color);
        }
        .secondary-btn:hover {
            background-color: #1a252f;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: var(--primary-color);
            color: white;
        }
        .comment-cell {
            font-style: italic;
            color: #555;
            line-height: 1.5;
        }
        .score-badge {
            font-weight: bold;
        }
        .instruction {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 10px;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-logo">
        <img src="logo-app.png" alt="Logo Roboki" class="app-logo">
        <h1>Phần Mềm Hỗ Trợ Giáo Viên Chủ Nhiệm 4.0</h1>
    </div>
    
    <div class="batch-area">
        <label>Thầy cô dán danh sách từ Excel vào đây:</label>
        <div class="instruction">Cách làm: Bôi đen cột "Họ Tên" và "Điểm TB" trong Excel -> Copy -> Paste vào ô dưới.</div>
        <textarea id="excelInput" placeholder="Ví dụ:&#10;Nguyễn Văn A&#9;8.5&#10;Lê Thị B&#9;7.2"></textarea>
        <div class="btn-group">
            <button onclick="processData()">Xử Lý Toàn Bộ Danh Sách</button>
            <button class="secondary-btn" onclick="clearData()">Xóa Hết</button>
        </div>
    </div>

    <table id="resultTable">
        <thead>
            <tr>
                <th width="5%">STT</th>
                <th width="20%">Họ Tên</th>
                <th width="10%">Điểm TB</th>
                <th width="65%">Nhận Xét Cuối Năm (Tự động)</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- Dữ liệu sẽ hiển thị ở đây -->
        </tbody>
    </table>
</div>

<script>
    // Giữ nguyên đoạn script xử lý logic
    function generateComment(score) {
        const comments = {
            excellent: [
                "Học sinh có tố chất thông minh, tư duy logic tốt. Luôn chủ động trong học tập và hoàn thành xuất sắc mọi nhiệm vụ.",
                "Năng lực học tập vượt trội, thái độ cầu tiến. Là tấm gương sáng cho bạn bè noi theo.",
                "Kiến thức vững vàng, kỹ năng giải quyết vấn đề nhanh nhạy. Phát huy tốt khả năng tự học."
            ],
            good: [
                "Tiếp thu bài nhanh, có ý thức học tập tốt. Cần phát huy hơn nữa sự mạnh dạn khi phát biểu.",
                "Học tập chuyên cần, kết quả ổn định. Khả năng làm việc nhóm và giao tiếp tốt.",
                "Nắm vững kiến thức trọng tâm, thái độ học tập tích cực, văn hóa ứng xử chuẩn mực."
            ],
            average: [
                "Có cố gắng trong học tập nhưng kết quả chưa đều. Cần tập trung hơn ở các môn tự nhiên.",
                "Tiếp thu kiến thức cơ bản tốt, tuy nhiên cần rèn luyện thêm tính tự giác và kiên trì.",
                "Cần xây dựng phương pháp học tập khoa học hơn để cải thiện kết quả ở học kỳ tới."
            ],
            below: [
                "Kết quả học tập còn hạn chế, cần sự hỗ trợ sát sao từ gia đình và giáo viên.",
                "Chưa tập trung trong giờ học, kiến thức hổng nhiều. Cần nỗ lực gấp đôi trong năm học tới.",
                "Khả năng tiếp thu còn chậm, cần rèn luyện thêm kỹ năng đọc hiểu và làm bài tập cơ bản."
            ]
        };

        const random = (arr) => arr[Math.floor(Math.random() * arr.length)];

        if (score >= 8.0) return random(comments.excellent);
        if (score >= 6.5) return random(comments.good);
        if (score >= 5.0) return random(comments.average);
        return random(comments.below);
    }

    function processData() {
        const input = document.getElementById("excelInput").value.trim();
        if (!input) { alert("Vui lòng dán dữ liệu!"); return; }

        const lines = input.split('\n');
        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = "";

        lines.forEach((line, index) => {
            const parts = line.split(/\t|,/);
            if (parts.length >= 2) {
                const name = parts[0].trim();
                const score = parseFloat(parts[1].trim().replace(',', '.'));
                
                if (!isNaN(score)) {
                    const comment = generateComment(score);
                    
                    const row = `<tr>
                        <td>${index + 1}</td>
                        <td><strong>${name}</strong></td>
                        <td><span class="score-badge">${score}</span></td>
                        <td class="comment-cell">${comment}</td>
                    </tr>`;
                    tbody.innerHTML += row;
                }
            }
        });
    }

    function clearData() {
        document.getElementById("excelInput").value = "";
        document.getElementById("tableBody").innerHTML = "";
    }
</script>
</body>
</html>
